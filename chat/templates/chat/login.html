<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Messenger Pro</title>
    <link rel="stylesheet" href="/static/chat/style.css">
    <style>
        /* Додаткові стилі суто для центрування форми логіну */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background: #0f172a;
        }
        .login-card {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #1f2937;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 24px;
            color: #fff;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
        }
        .login-card button {
            width: 100%;
            background: #2563eb;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: #1d4ed8;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Вхід у Messenger</h2>

            {% if form.errors %}
                <p class="error-msg">Неправильний логін або пароль!</p>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Логін</label>
                    <input type="text" name="username" id="username" placeholder="Введіть логін" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" name="password" id="password" placeholder="Введіть пароль" required>
                </div>
                <button type="submit">Увійти</button>
                <a href="{% url 'register' %}" style="display: block; margin-top: 20px; color: #3b82f6; text-decoration: none; font-size: 14px;">Немає акаунту? Зареєструватися</a>
            </form>
        </div>
    </div>
</body>
</html>
