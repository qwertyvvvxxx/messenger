<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — Messenger Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            background: #0f172a;
            padding: 20px;
        }
        .login-card {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #1f2937;
            width: 100%;
            max-width: 440px;
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 10px;
            color: #fff;
        }
        .login-card p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }
        .form-group label {
            color: #94a3b8;
            font-size: 14px;
            display: block;
        }
        .form-group input {
            width: 100%;
            margin-top: 6px;
            display: block;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 16px; /* Запобігає автонаближенню екрану на мобільних */
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3b82f6;
        }
        .login-card button {
            width: 100%;
            background: #2563eb;
            color: white;
            font-weight: bold;
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        .login-card button:hover {
            background: #1d4ed8;
        }
        .error-msg {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: left;
        }
        .register-link {
            display: block;
            margin-top: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
        }
        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Вхід у Messenger</h2>
            <p>З поверненням до нашого месенджера</p>

            {% if form.errors %}
                <div class="error-msg">Неправильний логін або пароль!</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Логін</label>
                    <input type="text" name="username" id="username" placeholder="Введіть логін" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" name="password" id="password" placeholder="Введіть пароль" required>
                </div>
                <button type="submit">Увійти</button>
            </form>

            <a href="{% url 'register' %}" class="register-link">Немає акаунту? Зареєструватися</a>
        </div>
    </div>
</body>
</html>
